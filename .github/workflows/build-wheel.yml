name: Build Wheel [called]
on:
  workflow_call:
    inputs:
      tag:
        type: string
        default: ''
      prerelease:
        type: boolean
        default: false
      buildonly:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  create-wheel:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Update version
        if: ${{ ! inputs.buildonly }}
        run: echo "__version__='${{ inputs.version }}'" > cxone_sarif/__version__.py

      - name: Build package
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install build
          python3 -m build

      - name: Upload wheel artifact
        if: ${{ ! inputs.buildonly }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ github.run_number }}
          path: dist/*.whl 