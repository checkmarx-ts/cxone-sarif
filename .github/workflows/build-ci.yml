name: CI Build Steps [called]
on:
  workflow_dispatch:
  push:

env:
  TEST_TENANT: ${{ vars.TEST_CXONE_TENANT }}
  TEST_API_KEY: ${{ secrets.TEST_CXONE_API_KEY }}

permissions:
  contents: read

jobs:
  execute-dvwa-scan:
    runs-on: cx-public-ubuntu-x64
    outputs:
      scanid: ${{ steps.scan.outputs.scanid }}
    steps:
      - name: Clone DVWA
        run: git clone https://github.com/digininja/DVWA.git dvwa

      - name: Execute scan
        id: scan
        run: echo "scanid=ebc2a229-3ca1-4738-b313-cc90e87727db" >> $GITHUB_OUTPUT


  execute-cli-integration-test:
    runs-on: cx-public-ubuntu-x64
    needs: [execute-dvwa-scan]
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    container: python:${{ matrix.pver }}
    steps:
      - name: Fetch Code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b

      - name: Make virtual environment
        shell: bash
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install virtualenv
          virtualenv .venv
          . .venv/bin/activate

      - name: Install packages for pylint and CLI testing
        shell: bash
        run: |
          pip install .[cli]

      - name: CLI Integration Test
        shell: bash
        run: |
          cxone-sarif --tenant '$TEST_TENANT' --region US --api-key '$TEST_API_KEY' --level DEBUG ${{ needs.execute-dvwa-scan.outputs.scanid }}

  execute-module-integration-test:
    runs-on: cx-public-ubuntu-x64
    needs: [execute-dvwa-scan]
    env:
      CX_APIKEY: $TEST_API_KEY
      CX_TENANT: $TEST_TENANT
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    container: python:${{ matrix.pver }}
    steps:
      - name: Fetch Code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b

      - name: Make virtual environment
        shell: bash
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install virtualenv
          virtualenv .venv
          . .venv/bin/activate

      - name: Install packages for module integration testing
        shell: bash
        run: |
          pip install .

      - name: Module Integration Test
        shell: bash
        run: |
          python integration_tests/module.py


  execute-pylint-test:
    runs-on: cx-public-ubuntu-x64
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    container: python:${{ matrix.pver }}
    steps:
      - name: Fetch Code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b

      - name: Make virtual environment
        shell: bash
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install virtualenv
          virtualenv .venv
          . .venv/bin/activate

      - name: Install packages for pylint
        shell: bash
        run: |
          pip install pylint

      - name: Pylint
        shell: bash
        run: |
          pylint --disable=all --enable=E,F --disable=E1121 --score=false cxone_sarif


  # call-package-build:
  #   uses: ./.github/workflows/build.yml
  #   with:
  #     buildonly: true
