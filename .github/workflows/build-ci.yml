name: CI Build Steps [called]
on:
  workflow_call:
    secrets:
      TEST_TENANT_ID:
        required: true
      TEST_REGION:
        required: true
      TEST_OAUTH_CLIENT_SECRET:
        required: true
      TEST_OAUTH_CLIENT_ID:
        required: true
      TEST_API_KEY:
        required: true
  push:

jobs:
  execute-pylint-and-integration-tests-x64-aws:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    container: public.ecr.aws/lambda/python:${{ matrix.pver }}
    env:
      CXONE_TENANT: ${{ secrets.CXONE_TENANT }}
      CXONE_CLIENT_ID: ${{ secrets.CXONE_CLIENT_ID }}
      CXONE_CLIENT_SECRET: ${{ secrets.CXONE_CLIENT_SECRET }}
    steps:
      - name: Install required packages
        shell: bash
        run: yum install -y tar
        
      - name: Fetch Code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b

      - name: Make virtual environment
        shell: bash
        run: |
          pip install virtualenv
          virtualenv .venv
          . .venv/bin/activate

      - name: Install packages for integration testing only
        shell: bash
        run: |
          pip install .[cli]

      - name: Integration Test
        shell: bash
        run: |
          python integration_tests/execute.py
          
      - name: Install packages for pylint
        shell: bash
        run: |
          pip install pylint
          pip install .[cli]

      - name: Pylint
        shell: bash
        run: |
          pylint --disable=all --enable=E,F --disable=E1121 --score=false cxone_sarif

  execute-pylint-and-integration-tests-x64-python:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    container: python:${{ matrix.pver }}
    env:
      CXONE_TENANT: ${{ secrets.CXONE_TENANT }}
      CXONE_CLIENT_ID: ${{ secrets.CXONE_CLIENT_ID }}
      CXONE_CLIENT_SECRET: ${{ secrets.CXONE_CLIENT_SECRET }}
    steps:
      - name: Fetch Code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b

      - name: Make virtual environment
        shell: bash
        run: |
          pip install virtualenv
          virtualenv .venv
          . .venv/bin/activate

      - name: Install packages for integration testing only
        shell: bash
        run: |
          pip install .[cli]

      - name: Integration Test
        shell: bash
        run: |
          python integration_tests/execute.py
          
      - name: Install packages for pylint
        shell: bash
        run: |
          pip install pylint
          pip install .[cli]

      - name: Pylint
        shell: bash
        run: |
          pylint --disable=all --enable=E,F --disable=E1121 --score=false cxone_sarif

  

  call-package-build:
    uses: ./.github/workflows/build.yml
    with:
      buildonly: true
