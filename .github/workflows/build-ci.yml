name: CI Build
on:
  workflow_dispatch:
  push:

env:
  TEST_TENANT: ${{ vars.TEST_CXONE_TENANT }}
  TEST_API_KEY: ${{ secrets.TEST_CXONE_API_KEY }}

permissions:
  contents: read

jobs:
  execute-dvwa-scan:
    runs-on: cx-public-ubuntu-x64
    outputs:
      scanid: ${{ steps.scan.outputs.scanid }}
    steps:
      - name: Clone DVWA
        run: git clone https://github.com/digininja/DVWA.git dvwa

      - name: Download ast-cli and SCA resolver
        run: |
          mkdir -p ./bin
          curl -fsSL https://github.com/Checkmarx/ast-cli/releases/latest/download/ast-cli_linux_x64.tar.gz | tar -xz -C ./bin
          curl -fsSL https://sca-downloads.s3.amazonaws.com/cli/latest/ScaResolver-linux64.tar.gz | tar -xz -C ./bin

      - name: Execute scan
        id: scan
        run: |
          export cx_apikey=${{ env.TEST_API_KEY }}
          ./bin/cx scan create --sca-resolver ./bin/ScaResolver --file-filter '!bin' --project-name 'cxone-sarf-ci/dvwa' --branch 'any' -s . 
          echo "scanid=ebc2a229-3ca1-4738-b313-cc90e87727db" >> $GITHUB_OUTPUT


  execute-cli-integration-test:
    runs-on: cx-public-ubuntu-x64
    needs: [execute-dvwa-scan]
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.pver }}

      - name: Install packages for pylint and CLI testing
        shell: bash
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install .[cli]

      - name: CLI Integration Test
        shell: bash
        run: |
          cxone-sarif --tenant '${{ env.TEST_TENANT }}' --region US --api-key '${{ env.TEST_API_KEY }}' --level DEBUG ${{ needs.execute-dvwa-scan.outputs.scanid }}

  execute-module-integration-test:
    runs-on: cx-public-ubuntu-x64
    needs: [execute-dvwa-scan]
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.pver }}

      - name: Install packages for module integration testing
        shell: bash
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install .

      - name: Module Integration Test
        shell: bash
        run: |
          export CX_APIKEY=${{ env.TEST_API_KEY }}
          export CX_TENANT=${{ env.TEST_TENANT }}
          python integration_tests/module.py


  execute-pylint-test:
    runs-on: cx-public-ubuntu-x64
    strategy:
      max-parallel: 2
      matrix:
        pver:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.pver }}

      - name: Install packages for pylint
        shell: bash
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install . pylint

      - name: Pylint
        shell: bash
        run: |
          pylint --disable=all --enable=E,F --disable=E1121 --score=false cxone_sarif


  # call-package-build:
  #   uses: ./.github/workflows/build.yml
  #   with:
  #     buildonly: true
